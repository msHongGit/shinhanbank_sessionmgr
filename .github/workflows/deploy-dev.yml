name: Deploy to Dev Environment

on:
  push:
    branches: ["dev"]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'
      - 'LICENSE'

env:
  IMAGE_NAME: session-manager
  ACR_REGISTRY: ${{ secrets.ACR_LOGIN_SERVER }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: |
        uv venv
        uv pip install -e ".[dev]"

    - name: Run linter
      run: |
        uv run ruff check .
        uv run ruff format --check .

    - name: Run tests
      env:
        USE_MOCK_DB: "true"
        APP_ENV: "test"
        AGW_API_KEY: "test-agw-key"
        MA_API_KEY: "test-ma-key"
        PORTAL_API_KEY: "test-portal-key"
        VDB_API_KEY: "test-vdb-key"
      run: |
        uv run pytest -v --cov=app --cov-report=term

    - name: Set image tag
      id: image-tag
      run: |
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        IMAGE_TAG="dev-${SHORT_SHA}"
        echo "IMAGE_TAG=${IMAGE_TAG}" >> $GITHUB_OUTPUT
        echo "Building image with tag: ${IMAGE_TAG}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to ACR
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.ACR_LOGIN_SERVER }}
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: |
          ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.IMAGE_TAG }}
          ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:dev-latest
        build-args: |
          USE_MOCK_DB=true
        cache-from: type=registry,ref=${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:dev-buildcache
        cache-to: type=registry,ref=${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:dev-buildcache,mode=max

    - name: Checkout Helm chart repo
      uses: actions/checkout@v4
      with:
        repository: ${{ secrets.CHART_REPO }}
        token: ${{ secrets.CHART_TOKEN }}
        path: helm-chart

    - name: Update Helm values (dev)
      run: |
        cd helm-chart/${{ secrets.CHART_PATH }}
        
        # values-dev.yaml 업데이트
        if [ -f values-dev.yaml ]; then
          sed -i "s|tag:.*|tag: ${{ steps.image-tag.outputs.IMAGE_TAG }}|" values-dev.yaml
          echo "Updated values-dev.yaml:"
          cat values-dev.yaml
        else
          echo "Warning: values-dev.yaml not found, creating from values.yaml"
          cp values.yaml values-dev.yaml
          sed -i "s|tag:.*|tag: ${{ steps.image-tag.outputs.IMAGE_TAG }}|" values-dev.yaml
        fi

    - name: Commit and push chart changes
      run: |
        cd helm-chart
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add .
        git diff --staged --quiet || git commit -m "chore(session-manager): update dev image to ${{ steps.image-tag.outputs.IMAGE_TAG }}"
        git push

    - name: Deployment summary
      run: |
        echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Image**: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Environment**: dev" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Triggered by**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
