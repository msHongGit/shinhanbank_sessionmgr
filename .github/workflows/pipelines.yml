name: Build Push & Update Chart Repo

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'         # README.md 등 모든 마크다운 파일 무시
      - 'docs/**'       # docs 폴더 내부의 변경사항 무시
      - '.gitignore'    # gitignore 변경 무시
      - 'LICENSE'       # 라이선스 파일 무시

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set image tag
      run: |
        echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
        echo "IMAGE_NAME=${{ github.event.repository.name }}" | sed 's/^IMAGE_NAME=shinhanbank-sol-/IMAGE_NAME=/' >> $GITHUB_ENV


    - name: Login to ACR
      run: |
        echo "${{ secrets.ACR_PASSWORD }}" | docker login \
        ${{ secrets.ACR_LOGIN_SERVER }} \
        -u ${{ secrets.ACR_USERNAME }} \
        --password-stdin

    - name: Build & Push Image
      run: |
        docker build -t \
          ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.TAG }} .
        docker push \
          ${{ secrets.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ env.TAG }}

    - name: Checkout Helm chart repo
      uses: actions/checkout@v4
      with:
        repository: ${{ secrets.CHART_REPO }}
        token: ${{ secrets.CHART_TOKEN }}
        path: chart

    - name: Update values.yaml
      run: |
        sed -i "s/tag:.*/tag: \"${{ env.TAG }}\"/" \
          chart/${{ secrets.CHART_PATH }}/values.yaml

    - name: Commit & Push chart repo
      run: |
        cd chart
        git config user.name "Shinhanbank-SOL-CI-Bot"
        git config user.email "SHB-SOL-CI-Bot@noreply.github.com"
        git add .
        git commit -m "Update image tag to ${{ env.TAG }}"
        git push
