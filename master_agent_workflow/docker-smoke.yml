name: Docker Smoke

on:
  pull_request:
    branches:
      - main
      - dev 

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t master-agent:${{ github.sha }} .

      - name: Run container
        run: |
          set -euo pipefail
          docker run -d --rm --name master-agent-smoke -p 8000:8000 master-agent:${{ github.sha }}
          # Initial wait for container to stabilize
          sleep 5

      - name: Wait for health endpoint
        run: |
          set -euo pipefail
          for i in {1..25}; do
            if curl -fsS http://localhost:8000/health >/dev/null 2>&1; then
              echo "Health check passed on attempt $i"
              exit 0
            fi
            echo "Attempt $i: waiting for health endpoint..."
            sleep 1
          done
          echo "Health check failed after 25 attempts"
          docker logs master-agent-smoke || true
          exit 1

      - name: Show container logs on failure
        if: failure()
        run: docker logs master-agent-smoke

      - name: Stop container
        if: always()
        run: docker rm -f master-agent-smoke
