name: Lint and Tests

on:
  push:
    branches-ignore:
      - main
      - dev

jobs:
  lint-and-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run ruff autofix (light)
        run: uv run ruff check . --fix

      - name: Run ruff linting
        run: uv run ruff check .

      - name: Run mypy type checking (non-blocking)
        continue-on-error: true
        run: uv run mypy .

      - name: Run unit and integration tests (function, scenario, service)
        run: |
          uv run pytest -m "function or scenario or service" \
            --junitxml=report.xml \
            --tb=short \
            -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            report.xml

      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f report.xml ]; then
            tests=$(grep -oP 'tests="\K[0-9]+' report.xml | head -1)
            failures=$(grep -oP 'failures="\K[0-9]+' report.xml | head -1)
            errors=$(grep -oP 'errors="\K[0-9]+' report.xml | head -1)
            skipped=$(grep -oP 'skipped="\K[0-9]+' report.xml | head -1)
            
            echo "### Unit/Integration Tests (function, scenario, service)" >> $GITHUB_STEP_SUMMARY
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total | ${tests:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $((${tests:-0} - ${failures:-0} - ${errors:-0} - ${skipped:-0})) |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | ${failures:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | ${errors:-0} |" >> $GITHUB_STEP_SUMMARY
            echo "| Skipped | ${skipped:-0} |" >> $GITHUB_STEP_SUMMARY
          fi