# Session Manager Sprint 2 - Docker Compose
version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        USE_MOCK_DB: "true"
    container_name: session-manager-api
    ports:
      - "8000:8000"
    environment:
      # Sprint 2: Mock Repository Mode
      - USE_MOCK_DB=true
      - APP_ENV=dev
      - DEBUG=true
      - API_PREFIX=/api/v1
      
      # API Keys (환경변수에서 가져오거나 기본값 사용)
      - AGW_API_KEY=${AGW_API_KEY:-agw-api-key}
      - MA_API_KEY=${MA_API_KEY:-ma-api-key}
      - PORTAL_API_KEY=${PORTAL_API_KEY:-portal-api-key}
      - VDB_API_KEY=${VDB_API_KEY:-vdb-api-key}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sm-network

